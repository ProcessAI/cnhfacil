<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Modelo Lógico — Sistema de Autoescola</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f0f13;color:#e2e0d8;min-height:100vh;padding:32px 24px 64px}
header{text-align:center;margin-bottom:36px}
header h1{font-size:22px;font-weight:600;letter-spacing:-.3px;color:#f0ede6}
header p{font-size:13px;color:#555552;margin-top:6px}
.canvas-wrap{overflow:auto;border-radius:16px;border:1px solid #222228;background:#13131a}
svg{display:block;font-family:'Segoe UI',system-ui,sans-serif}
.tbl-title{font-size:13px;font-weight:600;fill:#fff}
.tbl-pk{font-size:11.5px;fill:#f0c96a}
.tbl-fk{font-size:11.5px;fill:#7eb8f7}
.tf{font-size:11.5px;fill:#8a8880}
.tbadge{font-size:9px;font-weight:700;letter-spacing:.4px}
.t11{fill:#52c97a}.tnn{fill:#8890ee}.t1n{fill:#c078d8}.ther{fill:#d4a84a}
.rel-line{fill:none;stroke-width:1.5}
.rlt{font-size:10px;font-weight:600;letter-spacing:.3px;text-anchor:middle;dominant-baseline:central}
footer{text-align:center;margin-top:28px;font-size:12px;color:#3a3a42}
</style>
</head>
<body>
<header>
  <h1>Modelo Lógico — Sistema de Autoescola</h1>
  <p>Schema SQL completo · 10 tabelas · todos os campos · 9 relacionamentos</p>
</header>
<div class="canvas-wrap">
<svg id="svg-erd" width="1340" height="1620" viewBox="0 0 1340 1620" role="img">

<desc>ERD completo com todos os campos de cada tabela e labels de relacionamento nas linhas.</desc>
<defs>
  <marker id="one" viewBox="0 0 10 16" refX="2" refY="8" markerWidth="8" markerHeight="10" orient="auto">
    <line x1="2" y1="1" x2="2" y2="15" stroke="context-stroke" stroke-width="1.8" stroke-linecap="round"/>
  </marker>
  <marker id="many" viewBox="0 0 14 14" refX="2" refY="7" markerWidth="10" markerHeight="10" orient="auto">
    <path d="M2 7L12 1M2 7L12 7M2 7L12 13" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round"/>
  </marker>
  <marker id="diam" viewBox="0 0 16 10" refX="15" refY="5" markerWidth="14" markerHeight="10" orient="auto">
    <polygon points="8,0 15,5 8,10 1,5" fill="context-stroke" opacity=".9"/>
  </marker>
</defs>
